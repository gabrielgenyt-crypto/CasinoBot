services:
  bot:
    build: .
    container_name: cryptovault-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist the SQLite database outside the container.
      - ./database:/app/database
    ports:
      # Webhook endpoint for deposit notifications.
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
